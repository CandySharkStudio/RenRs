name: Build Unsigned iOS IPA

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest # 必须用 macOS 环境

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.84.1

      - name: Add iOS targets to Rust
        run: rustup target add aarch64-apple-ios x86_64-apple-ios

      - name: Tauri iOS init
        run: | 
          npm install -g bun
          bun install
          bun tauri ios init
          bun tauri icon

      - name: Setup Fake Xcodebuild Wrapper
        run: |
          mkdir -p /tmp/tauri_wrapper
          REPO_DIR="$PWD"

          cat << 'EOF' > /tmp/tauri_wrapper/cargo
          #!/bin/bash
          REAL_CARGO=~/.cargo/bin/cargo
          "$REAL_CARGO" "$@"
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then exit$EXIT_CODE; fi
          if [[ "$*" == *"--target aarch64-apple-ios"* ]] && [[ "$*" == *"--lib"* ]]; then
            echo ">>> [Cargo Hook] iOS 静态库编译完成，正在检查 mlua 符号..."
            TARGET_DIR="$PWD/src-tauri/target"
            LIBAPP_FILE=$(find "$TARGET_DIR" -path "*/aarch64-apple-ios/release/libapp.a" 2>/dev/null | head -n 1)
            if [ -f "$LIBAPP_FILE" ]; then
              LUA_LIB=$(find "$TARGET_DIR" -name "liblua*.a" -path "*/build/*" 2>/dev/null | head -n 1)
              INJECTED=0
              if [ -n "$LUA_LIB" ]; then
                echo ">>> [Cargo Hook] 发现 vendored 产物: $LUA_LIB，正在解包并注入..."
                TEMP_DIR=$(mktemp -d)
                cd "$TEMP_DIR"
                ar x "$LUA_LIB"
                # 把 .o 文件强行合并进 libapp.a
                ar rcs "$LIBAPP_FILE" *.o
                ranlib "$LIBAPP_FILE"
                INJECTED=1
              else
                echo ">>> [Cargo Hook] 没找到 liblua.a，尝试寻找散落的 .o 文件..."
                LUA_O_FILES=$(find "$TARGET_DIR" -path "*/build/lua*" -name "*.o" 2>/dev/null)
                if [ -n "$LUA_O_FILES" ]; then
                  ar rcs "$LIBAPP_FILE"$LUA_O_FILES
                  ranlib "$LIBAPP_FILE"
                  INJECTED=1
                fi
              fi
              if [ $INJECTED -eq 1 ]; then
                echo ">>> [Cargo Hook] 成功！Lua C 符号已物理缝合进 libapp.a，Xcode 现在无话可说了！"
              else
                echo ">>> [Cargo Hook] 警告：mlua 的 vendored 根本没有生成任何 C 产物！"
                echo ">>> [Cargo Hook] 正在打印 build 目录结构，帮您排查原因："
                find "$TARGET_DIR" -maxdepth 4 -type d -name "build" -exec ls -l {} \; 2>/dev/null || true
              fi
            else
              echo ">>> [Cargo Hook] 错误：找不到 libapp.a！"
            fi
          fi
          exit $EXIT_CODE
          EOF
          chmod +x /tmp/tauri_wrapper/cargo
          cat << EOF > /tmp/tauri_wrapper/xcodebuild
          #!/bin/bash
          PROJ_FILE="$REPO_DIR/src-tauri/gen/apple/ren-rs.xcodeproj/project.pbxproj"
          if [ -f "\$PROJ_FILE" ]; then
            sed -i '' 's/DEVELOPMENT_TEAM = ".*";/DEVELOPMENT_TEAM = "";/g' "\$PROJ_FILE"
            sed -i '' '/CODE_SIGN_IDENTITY/d' "\$PROJ_FILE"
            sed -i '' '/CODE_SIGN_ENTITLEMENTS/d' "\$PROJ_FILE"
          fi
          
          LIBAPP_DIR="\$REPO_DIR/src-tauri/gen/apple/Externals/arm64/release"
          LIBAPP_FILE="\$LIBAPP_DIR/libapp.a"
          
          if [ -f "\$LIBAPP_FILE" ]; then
            echo "Search Lua File..."
            LUA_O_FILES=\$(find "\$REPO_DIR/src-tauri/target" -path "*/build/lua-src*/out/*.o" 2>/dev/null)
            if [ -z "\$LUA_O_FILES" ]; then
              LUA_LIB=\$(find "\$REPO_DIR/src-tauri/target" -name "liblua.a" -path "*/build/*" 2>/dev/null | head -n 1)
              if [ -n "\$LUA_LIB" ]; then
                echo "Find \$LUA_LIB File!，current unpack!"
                TEMP_DIR=\$(mktemp -d)
                cp "\$LUA_LIB" "\$TEMP_DIR/"
                cd "\$TEMP_DIR"
                ar x liblua.a
                LUA_O_FILES="\$TEMP_DIR/*.o"
              fi
            fi
          
            if [ -n "\$LUA_O_FILES" ]; then
              echo "Find Lua pack, now inject to libapp.a..."
              ar rcs "\$LIBAPP_FILE" \$LUA_O_FILES
              ranlib "\$LIBAPP_FILE"
              echo "Inject finish!!"
            else
              echo "Lua Build is not find!"
              exit 1
            fi
          fi
          /usr/bin/xcodebuild "\$@" \\
            CODE_SIGN_STYLE=Manual \\
            CODE_SIGNING_ALLOWED=NO \\
            CODE_SIGNING_REQUIRED=NO \\
            PROVISIONING_PROFILE_SPECIFIER=""
          EOF
          chmod +x /tmp/tauri_wrapper/xcodebuild
      - name: Build Unsigned IPA pack!
        env:
          APPLE_DEVELOPMENT_TEAM: "woainimiao"
          # DEVELOPMENT_TEAM: ""
          # CODE_SIGN_IDENTITY: "-"
          # CODE_SIGNING_ALLOWED: "NO"
          # CODE_SIGNING_REQUIRED: "NO"
          # PROVISIONING_PROFILE_SPECIFIER: ""
        run: |
          export PATH="/tmp/tauri_wrapper:$PATH"
          bun tauri ios build

      - name: Package Unsigned .ipa
        run: |
          ARCHIVE_PATH=$(find src-tauri -name "*.xcarchive" | head -n 1)
          echo "Found archive at: $ARCHIVE_PATH"
          mkdir -p Payload
          cp -R "$ARCHIVE_PATH/Products/Applications/"*.app Payload/
          zip -r MyApp.unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: MyApp.unsigned.ipa
