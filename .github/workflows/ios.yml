name: Build Unsigned iOS IPA

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest # 必须用 macOS 环境

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.84.1

      - name: Add iOS targets to Rust
        run: rustup target add aarch64-apple-ios x86_64-apple-ios

      - name: Tauri iOS init
        run: | 
          npm install -g bun
          bun install
          bun tauri ios init
          bun tauri icon

      - name: Setup Fake Xcodebuild Wrapper
        run: |
          mkdir -p /tmp/tauri_wrapper
          export REPO_DIR="${GITHUB_WORKSPACE:-$PWD}"
          cat << 'EOF' > /tmp/tauri_wrapper/cargo
          #!/bin/bash
          REAL_CARGO=\$(which -a cargo | grep -v "/tmp/tauri_wrapper" | head -n 1)
          if [ -z "\$REAL_CARGO" ]; then echo "找不到 cargo!"; exit 1; fi
          "\$REAL_CARGO" "\$@"
          EXIT_CODE=\$?
          if [ \$EXIT_CODE -ne 0 ]; then exit \$EXIT_CODE; fi
          if [[ "\$1" == "build" || "\$1" == "rustc" ]]; then
            GEN_DIR="\$REPO_DIR/src-tauri/gen/apple"
            LIBAPP_FILES=\$(find "\$GEN_DIR" -name "libapp.a" 2>/dev/null)
            for LIBAPP_FILE in \$LIBAPP_FILES; do
              HAS_LUA=\$(nm "\$LIBAPP_FILE" 2>/dev/null | grep "_luaL_checkstack" | head -n 1)
              if [ -z "\$HAS_LUA" ]; then
                echo ">>> [Cargo Hook] 捕获残缺 libapp.a: \$LIBAPP_FILE，开始注入 Lua..."
                LUA_LIB=\$(find "\$GEN_DIR" -name "liblua*.a" 2>/dev/null | head -n 1)
                INJECTED=0
                if [ -n "\$LUA_LIB" ]; then
                  echo ">>> [Cargo Hook] 找到现成 Lua 库: \$LUA_LIB"
                  TEMP_DIR=\$(mktemp -d)
                  cd "\$TEMP_DIR"
                  ar x "\$LUA_LIB"
                  ar rcs "\$LIBAPP_FILE" *.o
                  ranlib "\$LIBAPP_FILE"
                  INJECTED=1
                else
                  echo ">>> [Cargo Hook] 没找到 liblua.a，寻找散落 .o..."
                  LUA_O_FILES=\$(find "\$GEN_DIR" -name "*.o" -path "*lua*" 2>/dev/null)
                  if [ -n "\$LUA_O_FILES" ]; then
                    ar rcs "\$LIBAPP_FILE"\$LUA_O_FILES
                    ranlib "\$LIBAPP_FILE"
                    INJECTED=1
                  fi
                fi
                if [ \$INJECTED -eq 1 ]; then
                  echo ">>> [Cargo Hook] 注入成功！Xcode 链接器这次闭嘴了！"
                else
                  echo ">>> [Cargo Hook] 彻底破案：gen/apple 下连一个 Lua 的 .o 都没有！mlua vendored 根本没编译 C 代码！"
                  echo ">>> [Cargo Hook] 目录下所有产物："
                  find "\$GEN_DIR" \( -name "*.a" -o -name "*.o" \) 2>/dev/null | head -n 20
                fi
              else
                echo ">>> [Cargo Hook] \$LIBAPP_FILE 体检健康，已包含 Lua。"
              fi
            done
          fi
          exit \$EXIT_CODE
          EOF
          chmod +x /tmp/tauri_wrapper/cargo
          cat << EOF > /tmp/tauri_wrapper/xcodebuild
          #!/bin/bash
          PROJ_FILE="$REPO_DIR/src-tauri/gen/apple/ren-rs.xcodeproj/project.pbxproj"
          if [ -f "\$PROJ_FILE" ]; then
            sed -i '' 's/DEVELOPMENT_TEAM = ".*";/DEVELOPMENT_TEAM = "";/g' "\$PROJ_FILE"
            sed -i '' '/CODE_SIGN_IDENTITY/d' "\$PROJ_FILE"
            sed -i '' '/CODE_SIGN_ENTITLEMENTS/d' "\$PROJ_FILE"
          fi
          
          LIBAPP_DIR="\$REPO_DIR/src-tauri/gen/apple/Externals/arm64/release"
          LIBAPP_FILE="\$LIBAPP_DIR/libapp.a"
          
          if [ -f "\$LIBAPP_FILE" ]; then
            echo "Search Lua File..."
            LUA_O_FILES=\$(find "\$REPO_DIR/src-tauri/target" -path "*/build/lua-src*/out/*.o" 2>/dev/null)
            if [ -z "\$LUA_O_FILES" ]; then
              LUA_LIB=\$(find "\$REPO_DIR/src-tauri/target" -name "liblua.a" -path "*/build/*" 2>/dev/null | head -n 1)
              if [ -n "\$LUA_LIB" ]; then
                echo "Find \$LUA_LIB File!，current unpack!"
                TEMP_DIR=\$(mktemp -d)
                cp "\$LUA_LIB" "\$TEMP_DIR/"
                cd "\$TEMP_DIR"
                ar x liblua.a
                LUA_O_FILES="\$TEMP_DIR/*.o"
              fi
            fi
          
            if [ -n "\$LUA_O_FILES" ]; then
              echo "Find Lua pack, now inject to libapp.a..."
              ar rcs "\$LIBAPP_FILE" \$LUA_O_FILES
              ranlib "\$LIBAPP_FILE"
              echo "Inject finish!!"
            else
              echo "Lua Build is not find!"
              exit 1
            fi
          fi
          /usr/bin/xcodebuild "\$@" \\
            CODE_SIGN_STYLE=Manual \\
            CODE_SIGNING_ALLOWED=NO \\
            CODE_SIGNING_REQUIRED=NO \\
            PROVISIONING_PROFILE_SPECIFIER=""
          EOF
          chmod +x /tmp/tauri_wrapper/xcodebuild
      - name: Build Unsigned IPA pack!
        env:
          APPLE_DEVELOPMENT_TEAM: "woainimiao"
          # DEVELOPMENT_TEAM: ""
          # CODE_SIGN_IDENTITY: "-"
          # CODE_SIGNING_ALLOWED: "NO"
          # CODE_SIGNING_REQUIRED: "NO"
          # PROVISIONING_PROFILE_SPECIFIER: ""
        run: |
          export PATH="/tmp/tauri_wrapper:$PATH"
          bun tauri ios build

      - name: Package Unsigned .ipa
        run: |
          ARCHIVE_PATH=$(find src-tauri -name "*.xcarchive" | head -n 1)
          echo "Found archive at: $ARCHIVE_PATH"
          mkdir -p Payload
          cp -R "$ARCHIVE_PATH/Products/Applications/"*.app Payload/
          zip -r MyApp.unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: MyApp.unsigned.ipa
